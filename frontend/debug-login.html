<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; }
        input { width: 300px; padding: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; margin: 5px; }
        .result { margin: 20px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Debug Login - Same as React App</h2>
    
    <h3>Test Login (Exact same as React)</h3>
    <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" value="admin@test.com">
    </div>
    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" value="admin123">
    </div>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testLoginWithOrigin()">Test with Origin Header</button>
    
    <h3>Quick Test Users</h3>
    <button onclick="quickLogin('admin@test.com', 'admin123')">Login as Admin</button>
    <button onclick="quickLogin('customer@test.com', 'customer123')">Login as Customer</button>
    <button onclick="quickLogin('seller@test.com', 'seller123')">Login as Seller</button>

    <div id="result"></div>

    <script>
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const data = { email, password };
            const resultDiv = document.getElementById('result');
            
            console.log('Testing login with data:', data);
            
            try {
                // Exact same as React app
                const response = await fetch('http://localhost:8080/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);

                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Login Successful!</h3>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                        <p>You can now use this token to access the system.</p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Login Failed!</h3>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('Network error:', error);
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>🚫 Network Error!</h3>
                    <p>${error.message}</p>
                    <p><strong>This is the same error you're getting in React!</strong></p>
                    <p>Check browser console (F12) for more details.</p>
                `;
            }
        }
        
        async function testLoginWithOrigin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const data = { email, password };
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await fetch('http://localhost:8080/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:3000'
                    },
                    body: JSON.stringify(data),
                });

                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Login Successful (with Origin)!</h3>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Login Failed!</h3>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>🚫 Network Error!</h3>
                    <p>${error.message}</p>
                `;
            }
        }
        
        async function quickLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            await testLogin();
        }
    </script>
</body>
</html>
